openapi: 3.0.0
info:
  title: Parkinsons-Risk-Screening-System
  version: 2.1.0

paths:
  /api/v1/detect/ws:
    get:
      operationId: DetectWs
      summary: Detect Parkinsons via WebSocket audio stream
      parameters:
        - name: age
          in: query
          required: true
          schema:
            type: integer
        - name: sex
          in: query
          required: true
          schema:
            type: integer
            enum: [0, 1]
      responses:
        '101':
          description: Switching Protocols — WebSocket upgrade
        '200':
          description: Analysis result (returned as WS text frame)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ParkinsonsResponse'
        '500':
          description: Internal error
  /api/v1/detect/upload:
    post:
      operationId: DetectUpload
      parameters:
        - name: age
          in: query
          required: true
          schema:
            type: integer
        - name: sex
          in: query
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                audio:
                  type: string
                  format: binary
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ParkinsonsResponse'
components:
  schemas:
    ParkinsonsResponse:
      type: object
      properties:
        isHavingParkinsons:
          type: boolean
        severity:
          type: number
          format: float
        suggestion:
          type: string
        extractedVoiceFeatures:
          type: object