openapi: 3.0.0
info: 
  title: Parkinsons-Risk-Screening-System
  version: 1.1.0

paths:
  /api/v1/detect:
    post:
      summary: Detect Parkinsons from audio
      description: Send raw WAV audio as chunked transfer encoding, get detection result
      parameters:
        - name: age
          in: query
          required: true
          schema:
            type: integer
        - name: sex
          in: query
          required: true
          schema:
            type: integer
            enum: [0, 1]
      requestBody:
        required: true
        content:
          application/octet-stream:
            schema:
              type: string
              format: binary
      responses:
        '200':
          description: Detection result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ParkinsonsResponse'
        '500':
          description: Internal error

components:
  schemas:
    ParkinsonsResponse:
      type: object
      properties:
        isHavingParkinsons:
          type: boolean
        severity:
          type: number
          format: float
        suggestion:
          type: string
        extracedVoiceFeatures:
          type: object